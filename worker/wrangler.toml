name = "feedback-pyramid"
main = "feedback.js"
compatibility_date = "2025-01-01"

# Link gắn trong tin nhắn Telegram. Repo tên "books" → project page mặc định ở /books/.
# ⚠️ XÁC NHẬN lại URL Pages thực tế của bạn rồi sửa nếu khác (vd. có custom domain).
[vars]
SITE_URL = "https://dangtrungdev113999.github.io/books"

# KV để rate-limit. Namespace riêng cho worker này (tạo 2026-06-24).
[[kv_namespaces]]
binding = "FEEDBACK_RL"
id = "5601c0ecdb79457f8555d12d87984163"

# Secrets (KHÔNG để trong file này) — set bằng:
#   wrangler secret put TELEGRAM_BOT_TOKEN
#   wrangler secret put TELEGRAM_FEEDBACK_GROUP_ID
