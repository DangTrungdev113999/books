name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
      - run: npm ci
      # build:books (sinh public/data/*.json) chạy tự động qua prebuild, rồi vite build → dist/
      # VITE_WORKER_URL nạp từ repo secret (Settings → Secrets and variables → Actions),
      # tiêm vào lúc build để form "Ghi điều học được" biết worker gửi Telegram.
      - run: npm run build
        env:
          VITE_WORKER_URL: ${{ secrets.VITE_WORKER_URL }}

      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: 'dist'
      - id: deployment
        uses: actions/deploy-pages@v4
