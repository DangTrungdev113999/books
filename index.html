<!doctype html>
<html lang="vi" data-theme="salon">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Nguyên lý Kim tự tháp — Sơ đồ tư duy</title>
  <meta name="description" content="Sơ đồ hoá nội dung sách The Pyramid Principle (Barbara Minto) — đọc bản tiếng Việt theo từng nhánh." />

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Source+Serif+4:opsz,wght@8..60,600;8..60,700&family=JetBrains+Mono&display=swap" rel="stylesheet" />

  <!-- Theme tokens (Stream Intelligent) + app styles -->
  <link rel="stylesheet" href="css/tokens.css" />
  <link rel="stylesheet" href="css/app.css" />

  <!-- Mindmap + markdown libs (CDN) -->
  <script src="https://cdn.jsdelivr.net/npm/d3@7.9.0/dist/d3.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/markmap-view@0.18.12/dist/browser/index.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/markmap-lib@0.18.12/dist/browser/index.iife.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked@12.0.2/marked.min.js"></script>

  <!-- App config (WORKER_URL điền sau khi deploy Cloudflare Worker) -->
  <script src="config.js"></script>
</head>
<body>
  <div id="app">
    <aside id="sidebar">
      <div id="brand">
        <h1 id="brand-title">Nguyên lý Kim tự tháp</h1>
        <div class="by" id="brand-by">Barbara Minto · The Pyramid Principle</div>
      </div>
      <nav id="toc"></nav>
    </aside>

    <main id="main">
      <div id="topbar">
        <div id="map-title"></div>
        <div id="topbar-right">
          <!-- tiến độ đọc tổng: vòng tròn % + X/Y -->
          <button id="progress-pill" class="hidden" aria-label="Tiến độ đọc" title="Tiến độ đọc">
            <span class="ring">
              <svg viewBox="0 0 24 24">
                <circle class="ring-bg" cx="12" cy="12" r="9" />
                <circle class="ring-fg" cx="12" cy="12" r="9" />
              </svg>
              <span class="ring-pct" id="prog-pct">0</span>
            </span>
            <span class="ptext"><b id="prog-read">0</b><span class="sep">/</span><span id="prog-total">0</span></span>
          </button>
          <!-- nhật ký hoạt động -->
          <button class="icon-btn" id="history-btn" aria-label="Lịch sử hoạt động">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><path d="M3 3v5h5"/><path d="M3.05 13A9 9 0 1 0 6 5.3L3 8"/><path d="M12 7v5l3 2"/></svg>
            <span>Hoạt động</span>
          </button>
          <button class="icon-btn" id="theme-btn" aria-haspopup="true" aria-label="Đổi giao diện">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><circle cx="13.5" cy="6.5" r=".5" fill="currentColor"/><circle cx="17.5" cy="10.5" r=".5" fill="currentColor"/><circle cx="8.5" cy="7.5" r=".5" fill="currentColor"/><circle cx="6.5" cy="12.5" r=".5" fill="currentColor"/><path d="M12 2C6.5 2 2 6.5 2 12s4.5 10 10 10c.926 0 1.648-.746 1.648-1.688 0-.437-.18-.835-.437-1.125-.29-.289-.438-.652-.438-1.125a1.64 1.64 0 0 1 1.668-1.668h1.996C18.978 16.668 22 13.646 22 9.9 22 5.646 17.5 2 12 2z"/></svg>
            <span id="theme-label">Salon</span>
            <span class="swatch-trio" id="theme-swatch"></span>
          </button>
        </div>
      </div>
      <div id="theme-menu"></div>

      <!-- Thẻ "Tiếp tục đọc" — hiện khi quay lại, đưa về đúng mục + vị trí cuộn -->
      <div id="resume-card" class="hidden">
        <span class="rc-glyph">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>
        </span>
        <div class="rc-text">
          <span class="rc-kicker">Tiếp tục đọc</span>
          <span class="rc-title" id="resume-title"></span>
        </div>
        <button class="rc-go" id="resume-go">Mở tiếp<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14"/><path d="M13 6l6 6-6 6"/></svg></button>
        <button class="rc-dismiss" id="resume-dismiss" aria-label="Bỏ qua">&times;</button>
      </div>

      <svg id="map"></svg>
      <div id="hint-bar">Click vào một nhánh để đọc · cuộn để zoom · kéo để di chuyển</div>
    </main>
  </div>

  <!-- Drawer Lịch sử hoạt động -->
  <div id="history-overlay" class="hidden">
    <aside id="history-panel" role="dialog" aria-label="Lịch sử hoạt động">
      <header class="hp-head">
        <div class="hp-title">
          <span class="hp-kicker">Nhật ký</span>
          <h2>Hoạt động đọc</h2>
        </div>
        <button id="history-clear" class="hp-clear">Xoá hết</button>
        <button id="history-close" class="hp-close" aria-label="Đóng">&times;</button>
      </header>
      <div id="history-list"></div>
    </aside>
  </div>

  <!-- Popup -->
  <div id="overlay">
    <div id="modal" role="dialog" aria-modal="true">
      <header id="modal-head">
        <div class="htext">
          <div class="crumb" id="modal-crumb"></div>
          <h2 id="modal-title"></h2>
        </div>
        <div class="lang-toggle" id="lang-toggle">
          <button data-lang="vi" class="active">Tiếng Việt</button>
          <button data-lang="en">English</button>
        </div>
        <button id="modal-close" aria-label="Đóng">&times;</button>
      </header>
      <div id="modal-body"></div>
      <div id="modal-foot">
        <!-- panel góp ý: gập mặc định, xổ ra khi bấm "Ghi điều học được" -->
        <section id="feedback">
          <div class="fb-inner">
            <div class="composer">
              <input id="fb-name" class="cmp-name" type="text" placeholder="Tên của bạn" maxlength="50" />
              <textarea id="fb-comment" class="cmp-text" placeholder="Mình học được điều gì từ phần này?" maxlength="1000"></textarea>
              <div class="cmp-bar">
                <span class="cmp-count" id="fb-count">0</span>
                <span class="status" id="fb-status"></span>
                <button class="btn-send" id="fb-send">
                  <span>Gửi</span>
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 2 11 13"/><path d="M22 2 15 22l-4-9-9-4Z"/></svg>
                </button>
              </div>
            </div>
          </div>
        </section>
        <!-- thanh footer gọn: luôn 1 dòng -->
        <div id="foot-bar">
          <button class="foot-btn" id="nav-prev" title="">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg>
            <span>Trước</span>
          </button>
          <button class="foot-btn note-toggle" id="note-toggle">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.1 2.1 0 0 1 3 3L7 19l-4 1 1-4Z"/></svg>
            <span>Ghi điều học được</span>
            <svg class="chev" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M18 15l-6-6-6 6"/></svg>
          </button>
          <button class="foot-btn" id="nav-next" title="">
            <span>Tiếp</span>
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18l6-6-6-6"/></svg>
          </button>
        </div>
      </div>
    </div>
  </div>

  <div id="tooltip"></div>
  <div id="navtip"></div>

  <script type="module" src="js/app.js"></script>
</body>
</html>
