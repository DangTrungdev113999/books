<!doctype html>
<html lang="vi">
<head>
<meta charset="utf-8" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Source+Serif+4:opsz,wght@8..60,600;8..60,700&display=swap" rel="stylesheet" />
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 1200px; height: 630px; }
  body {
    font-family: 'Inter', sans-serif;
    background:
      radial-gradient(120% 140% at 82% 8%, #faf9f5 0%, #f5f4ed 46%, #efece1 100%);
    color: #141413;
    position: relative;
    overflow: hidden;
  }
  /* hairline frame */
  .frame {
    position: absolute; inset: 28px;
    border: 1px solid #d1cfc5; border-radius: 18px;
  }
  /* faint oversized watermark pyramid on the right */
  .ghost {
    position: absolute; right: -90px; top: 50%; transform: translateY(-50%);
    width: 560px; height: 560px; opacity: 0.10;
  }
  .wrap {
    position: absolute; inset: 0;
    padding: 96px 92px;
    display: flex; flex-direction: column; justify-content: space-between;
  }
  .top { display: flex; align-items: center; gap: 20px; }
  .mark { width: 76px; height: 76px; }
  .kicker {
    font-size: 19px; font-weight: 600; letter-spacing: 0.22em;
    text-transform: uppercase; color: #c96442;
  }
  .title {
    font-family: 'Source Serif 4', serif; font-weight: 700;
    font-size: 104px; line-height: 0.98; letter-spacing: -0.02em;
    max-width: 880px;
  }
  .subtitle {
    margin-top: 22px;
    font-family: 'Source Serif 4', serif; font-weight: 600;
    font-size: 33px; line-height: 1.32; color: #534f47;
    max-width: 760px;
  }
  .bottom { display: flex; align-items: center; gap: 16px; }
  .pill {
    font-size: 21px; font-weight: 600; color: #534f47;
    background: #ece9df; border: 1px solid #d1cfc5;
    padding: 11px 20px; border-radius: 999px;
  }
  .author { font-size: 22px; font-weight: 600; color: #75736b; font-style: italic;
    font-family: 'Source Serif 4', serif; }
</style>
</head>
<body>
  <div class="frame"></div>

  <svg class="ghost" viewBox="0 0 64 64" fill="none" stroke="#c96442" stroke-width="2.4" stroke-linejoin="round" stroke-linecap="round">
    <path d="M32 9 L55 52 H9 Z"/>
    <path d="M24 22 H40"/>
    <path d="M17 37 H47"/>
  </svg>

  <div class="wrap">
    <div class="top">
      <svg class="mark" viewBox="0 0 64 64">
        <rect width="64" height="64" rx="14" fill="#faf9f5" stroke="#d1cfc5" stroke-width="1.2"/>
        <g fill="none" stroke="#c96442" stroke-width="3.4" stroke-linejoin="round" stroke-linecap="round">
          <path d="M32 11 L53 50 H11 Z"/>
          <path d="M24.8 24.4 H39.2"/>
          <path d="M18.6 37.4 H45.4"/>
        </g>
        <circle cx="32" cy="16.5" r="3.1" fill="#c96442"/>
      </svg>
      <div class="kicker">Đọc song ngữ · Sơ đồ hoá</div>
    </div>

    <div>
      <div class="title">The Pyramid<br/>Principle</div>
      <div class="subtitle">Logic in Writing, Thinking and Problem Solving</div>
    </div>

    <div class="bottom">
      <span class="pill">16 phần · Anh — Việt</span>
      <span class="pill">Mindmap từng chương</span>
      <span class="author">— Barbara Minto</span>
    </div>
  </div>
</body>
</html>
